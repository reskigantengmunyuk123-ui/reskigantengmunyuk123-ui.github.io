<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Game Tebak Negara</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: linear-gradient(135deg, #5aa9ff, #d16fff);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 350px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .hint {
      font-size: 14px;
      margin-bottom: 10px;
      font-style: italic;
    }

    /*  DISPLAY BARU */
    .word {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .box {
      width: 40px;
      height: 50px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      text-align: center;
    }

    button {
      background: gold;
      border: none;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      width: 80%;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: orange;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Game Tebak Negara</h2>
  <p>Isi dengan benar!</p>

  <div class="hint" id="hint"></div>
  <div class="word" id="word"></div>

  <input type="text" id="input" placeholder="Masukkan Huruf / Kata">
  <br>
  <button onclick="tebak()">Tebak</button>

  <p>Kesempatan: <span id="chance"></span></p>
</div>

<script>
  const negaraList = [
    { nama: "IRAN", hint: "Negara di Timur Tengah" },
    { nama: "JEPANG", hint: "Negara sakura" },
    { nama: "MESIR", hint: "Negara piramida" },
    { nama: "INDIA", hint: "Negara Taj Mahal" },
    { nama: "CHINA", hint: "Negara dengan Tembok Besar" }
  ];

  let currentIndex = 0;
  let negara, hint, display, kesempatan;

  function mulaiGame() {
    let data = negaraList[currentIndex];
    negara = data.nama;
    hint = data.hint;

    display = Array(negara.length).fill("●");
    kesempatan = 5;

    document.getElementById("hint").innerText = "Petunjuk: " + hint;
    document.getElementById("chance").innerText = kesempatan;
    updateDisplay();
  }

  function updateDisplay() {
    document.getElementById("word").innerHTML = display
      .map(h => `<div class="box">${h}</div>`)
      .join("");
  }

  function nextSoal() {
    currentIndex++;

    if (currentIndex >= negaraList.length) {
      alert("Semua soal selesai! Ulang dari awal ya!");
      currentIndex = 0;
    }

    mulaiGame();
  }

  function tebak() {
    let input = document.getElementById("input").value.toUpperCase();
    document.getElementById("input").value = "";

    if (!input) return;

    if (input.length > 1) {
      if (input === negara) {
        alert("Tumben Benar! Jawaban: " + negara);
        nextSoal();
        return;
      } else {
        kesempatan--;
      }
    } else {
      let benar = false;

      for (let i = 0; i < negara.length; i++) {
        if (negara[i] === input) {
          display[i] = input;
          benar = true;
        }
      }

      if (!benar) kesempatan--;
    }

    document.getElementById("chance").innerText = kesempatan;
    updateDisplay();

    if (!display.includes("●")) {
      alert("Benar! Jawaban: " + negara);
      nextSoal();
    }

    if (kesempatan === 0) {
      alert("Salah! Jawaban: " + negara);
      nextSoal();
    }
  }

  document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") tebak();
  });

  mulaiGame();
  
</script>

</body>
</html>
